name: Mirror repo to public github repo msgSAP for ERP, ovp

on: [push, delete]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SOURCE_TOKEN }}
      
      - name: Mirror to destination repo
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: git@github.com:msgSAP/ovp #ssh
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY_ERP }}
